spring:
  application:
    name: medsim-back
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/medsim}
    username: ${DB_USERNAME:medsim_user}
    password: ${DB_PASSWORD:medsim_password}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    org.springframework.security: INFO

medsim:
  logging:
    slow-request-threshold-ms: ${MEDSIM_SLOW_REQUEST_THRESHOLD_MS:1500}
